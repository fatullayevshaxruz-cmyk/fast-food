<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Food Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Fast Food Admin Panel</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow">
                <h3 class="text-gray-500">Foydalanuvchilar</h3>
                <p class="text-3xl font-bold" id="users-count">-</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow">
                <h3 class="text-gray-500">Buyurtmalar</h3>
                <p class="text-3xl font-bold" id="orders-count">-</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow">
                <h3 class="text-gray-500">Daromad</h3>
                <p class="text-3xl font-bold" id="revenue">-</p>
            </div>
        </div>
        
        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-bold mb-4">Oxirgi buyurtmalar</h2>
            <div id="orders-list" class="space-y-4">
                Loading...
            </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            try {
                // Fetch Stats
                const statsRes = await fetch('/api/stats');
                const stats = await statsRes.json();
                document.getElementById('users-count').innerText = stats.users;
                document.getElementById('orders-count').innerText = stats.orders;
                document.getElementById('revenue').innerText = stats.revenue.toLocaleString() + " so'm";
                
                // Fetch Orders
                const ordersRes = await fetch('/api/orders');
                const orders = await ordersRes.json();
                const list = document.getElementById('orders-list');
                list.innerHTML = '';
                
                orders.forEach(order => {
                    const div = document.createElement('div');
                    div.className = "border-b pb-2 flex justify-between";
                    div.innerHTML = `
                        <div>
                            <p class="font-bold">#${order.id}</p>
                            <p class="text-sm text-gray-500">${new Date(order.created_at).toLocaleString()}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold">${order.total_amount.toLocaleString()} so'm</p>
                            <span class="px-2 py-1 bg-blue-100 text-blue-800 rounded text-xs">${order.status}</span>
                        </div>
                    `;
                    list.appendChild(div);
                });
            } catch (e) {
                console.error(e);
            }
        }
        
        // Mock fetch if running file directly without backend
        if (location.protocol === 'file:') {
            document.getElementById('users-count').innerText = "150";
            document.getElementById('orders-count').innerText = "43";
            document.getElementById('revenue').innerText = "2,500,000 so'm";
            document.getElementById('orders-list').innerHTML = "<p>Backend not connected (File Mode)</p>";
        } else {
            fetchData();
            setInterval(fetchData, 30000);
        }
    </script>
</body>
</html>
